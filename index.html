<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quality Auto Sales and Service</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#050505;
color:white
}
.wrap{
max-width:1400px;
margin:auto;
padding:0 20px
}
header{
background:#000;
padding:18px 0;
border-bottom:1px solid #222
}
.logo{
font-size:38px;
font-weight:900;
color:#00d9ff
}
.logo span{
color:#f00000
}
nav{
display:flex;
gap:20px;
margin-top:10px;
flex-wrap:wrap
}
nav button{
background:none;
border:none;
color:white;
font-weight:700;
cursor:pointer
}
.hero{
padding:50px 0;
background:linear-gradient(to right,#050505,#111)
}
.hero h1{
font-size:52px;
margin:0
}
.red{color:#f00000}
.cyan{color:#00d9ff}

.btn{
background:#e00000;
border:none;
padding:12px 22px;
color:white;
font-weight:700;
cursor:pointer;
border-radius:6px
}

.cars{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin:30px 0
}

.card{
background:#111;
border-radius:10px;
overflow:hidden;
border:1px solid #222
}

.card img{
width:100%;
height:200px;
object-fit:cover
}

.card-content{
padding:15px
}

.price{
font-size:24px;
font-weight:900;
color:#f00000
}

.small{
color:#bbb;
font-size:14px
}

.modal,.admin{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
z-index:100;
padding:20px;
overflow:auto
}

.modal-inner,.admin-inner{
background:#111;
padding:20px;
border-radius:12px;
max-width:1000px;
width:100%;
border:1px solid #00d9ff
}

.gallery-main{
width:100%;
height:420px;
object-fit:cover;
border-radius:10px;
background:#000
}

.gallery-row{
display:flex;
gap:10px;
overflow:auto;
margin-top:10px
}

.gallery-thumb{
width:110px;
height:80px;
object-fit:cover;
border-radius:8px;
border:2px solid transparent;
cursor:pointer
}

.gallery-thumb.active{
border-color:#00d9ff
}

.drop-zone{
border:2px dashed #00d9ff;
padding:30px;
border-radius:12px;
text-align:center;
margin-top:10px;
background:#0c0c0c
}

.drop-zone.drag{
background:#111f24
}

.preview-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:12px;
margin-top:15px
}

.preview-card{
position:relative
}

.preview-card img{
width:100%;
height:100px;
object-fit:cover;
border-radius:10px;
border:2px solid #222
}

.preview-card button{
position:absolute;
top:5px;
right:5px;
background:red;
border:none;
color:white;
border-radius:50%;
width:24px;
height:24px;
cursor:pointer
}

.admin-car{
border:1px solid #222;
padding:15px;
border-radius:10px;
margin-top:15px
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
background:#000;
border:1px solid #333;
color:white;
border-radius:6px
}

.admin-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px
}

@media(max-width:800px){
.hero h1{
font-size:38px
}
.gallery-main{
height:250px
}
}
</style>
</head>

<body>

<header>
<div class="wrap">
<div class="logo"><span>Quality</span> Auto Sales and Service</div>

<nav>
<button onclick="goHome()">HOME</button>
<button onclick="openAdmin()">ADMIN</button>
</nav>
</div>
</header>

<section class="hero">
<div class="wrap">
<h1>QUALITY CARS.<br><span class="red">QUALITY SERVICE.</span></h1>
<p class="small">Windsor Ontario Used Cars & Auto Repair</p>
<br>
<button class="btn" onclick="openAdmin()">OPEN ADMIN PANEL</button>
</div>
</section>

<div class="wrap">
<div class="cars" id="cars"></div>
</div>

<div class="modal" id="vehicleModal">
<div class="modal-inner">
<img id="mainGalleryImage" class="gallery-main">

<div class="gallery-row" id="galleryRow"></div>

<h2 id="vehicleTitle" class="cyan"></h2>
<div id="vehiclePrice" class="price"></div>
<p id="vehicleDetails"></p>

<br>
<button class="btn" onclick="closeVehicle()">CLOSE</button>
</div>
</div>

<div class="admin" id="adminPanel">
<div class="admin-inner">

<div style="display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap">
<h2 class="cyan">FACEBOOK MARKETPLACE STYLE ADMIN</h2>
<button class="btn" onclick="closeAdmin()">SAVE & CLOSE</button>
</div>

<p class="small">PIN: 1234</p>

<div class="admin-grid">
<input id="name" placeholder="Vehicle Name">
<input id="price" placeholder="Price">
<input id="mileage" placeholder="Mileage">
<input id="details" placeholder="Details">
</div>

<div class="drop-zone" id="dropZone">
<h3>Drag & Drop Photos Here</h3>
<p class="small">or click below to upload multiple photos</p>
<input type="file" id="images" multiple accept="image/*">
</div>

<div class="preview-grid" id="previewGrid"></div>

<br>
<button class="btn" onclick="addVehicle()">POST VEHICLE</button>

<hr style="margin:30px 0;border-color:#222">

<div id="adminCars"></div>

</div>
</div>

<script>

let tempImages=[];

let cars = JSON.parse(localStorage.getItem("cars")) || [
{
name:"2018 BMW 340i",
price:"$26,995",
mileage:"122,000 KM",
details:"M Sport Package",
images:["https://images.unsplash.com/photo-1555215695-3004980ad54e?q=80&w=1200"]
}
];

function saveCars(){
localStorage.setItem("cars",JSON.stringify(cars));
renderCars();
renderAdminCars();
}

function renderCars(){

document.getElementById("cars").innerHTML = cars.map((car,index)=>`
<div class="card">
<img src="${car.images[0]}">
<div class="card-content">
<h3>${car.name}</h3>
<div class="price">${car.price}</div>
<p class="small">${car.mileage}<br>${car.details}</p>
<button class="btn" onclick="openVehicle(${index})">VIEW</button>
</div>
</div>
`).join("");

}

function openVehicle(index){

const car=cars[index];

document.getElementById("vehicleTitle").innerText=car.name;
document.getElementById("vehiclePrice").innerText=car.price;
document.getElementById("vehicleDetails").innerText=car.mileage+" • "+car.details;

document.getElementById("mainGalleryImage").src=car.images[0];

document.getElementById("galleryRow").innerHTML=car.images.map((img,i)=>`
<img src="${img}" class="gallery-thumb ${i===0?'active':''}"
onclick="changeGalleryImage('${img}',this)">
`).join("");

document.getElementById("vehicleModal").style.display="flex";

}

function changeGalleryImage(src,el){

document.getElementById("mainGalleryImage").src=src;

document.querySelectorAll(".gallery-thumb").forEach(t=>{
t.classList.remove("active");
});

el.classList.add("active");

}

function closeVehicle(){
document.getElementById("vehicleModal").style.display="none";
}

function openAdmin(){

const pin=prompt("Enter Admin PIN");

if(pin==="1234"){
document.getElementById("adminPanel").style.display="flex";
}else if(pin!==null){
alert("Wrong PIN");
}

}

function closeAdmin(){
document.getElementById("adminPanel").style.display="none";
}

function renderPreview(){

document.getElementById("previewGrid").innerHTML=tempImages.map((img,index)=>`
<div class="preview-card">
<img src="${img}">
<button onclick="removeTempImage(${index})">×</button>
</div>
`).join("");

}

function removeTempImage(index){
tempImages.splice(index,1);
renderPreview();
}

function handleFiles(files){

Array.from(files).forEach(file=>{

const reader = new FileReader();

reader.onload=function(e){
tempImages.push(e.target.result);
renderPreview();
}

reader.readAsDataURL(file);

});

}

document.getElementById("images").addEventListener("change",function(e){
handleFiles(e.target.files);
});

const dropZone=document.getElementById("dropZone");

dropZone.addEventListener("dragover",e=>{
e.preventDefault();
dropZone.classList.add("drag");
});

dropZone.addEventListener("dragleave",()=>{
dropZone.classList.remove("drag");
});

dropZone.addEventListener("drop",e=>{
e.preventDefault();
dropZone.classList.remove("drag");
handleFiles(e.dataTransfer.files);
});

function addVehicle(){

const name=document.getElementById("name").value;
const price=document.getElementById("price").value;
const mileage=document.getElementById("mileage").value;
const details=document.getElementById("details").value;

if(!name || !price){
alert("Add vehicle name and price");
return;
}

if(tempImages.length===0){
alert("Upload vehicle photos");
return;
}

cars.unshift({
name,
price,
mileage,
details,
images:[...tempImages]
});

saveCars();

document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("mileage").value="";
document.getElementById("details").value="";
document.getElementById("images").value="";

tempImages=[];
renderPreview();

alert("Vehicle Posted");

}

function renderAdminCars(){

document.getElementById("adminCars").innerHTML=cars.map((car,index)=>`
<div class="admin-car">

<div style="display:flex;gap:10px;overflow:auto">
${car.images.map(img=>`
<img src="${img}" style="width:120px;height:90px;object-fit:cover;border-radius:8px">
`).join("")}
</div>

<h3>${car.name}</h3>
<div class="price">${car.price}</div>

<button class="btn" onclick="deleteVehicle(${index})">DELETE</button>

</div>
`).join("");

}

function deleteVehicle(index){

if(confirm("Delete Vehicle?")){
cars.splice(index,1);
saveCars();
}

}

renderCars();
renderAdminCars();

</script>

</body>
</html>
